<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — ZimRent</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">Zim<span>Rent</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html">Browse</a></li>
            <li><a href="login.html" id="nav-login">Sign In</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width:450px; margin-top:3rem;">
        <div class="form-card">
            <h2 style="text-align:center; margin-bottom:0.5rem;">Create Account</h2>
            <p style="text-align:center; color:var(--text-muted); margin-bottom:2rem;">Join ZimRent and start listing properties</p>
            
            <div id="auth-error" style="display:none; padding:0.8rem; background:#ffe6e6; color:var(--danger); border-radius:8px; margin-bottom:1rem; font-size:0.9rem;"></div>
            
            <form id="register-form">
                <!-- Profile Picture -->
                <div style="text-align:center; margin-bottom:1.5rem;">
                    <div id="reg-pic-container" style="width:90px; height:90px; border-radius:50%; overflow:hidden; margin:0 auto; background:#e0e0e0; display:flex; align-items:center; justify-content:center; border:2px solid var(--primary); cursor:pointer;" onclick="document.getElementById('reg-pic-input').click()">
                        <i class="fas fa-user-circle" style="font-size:3.5rem; color:#999;" id="reg-pic-placeholder"></i>
                        <img id="reg-pic-img" style="width:100%; height:100%; object-fit:cover; display:none;">
                    </div>
                    <div style="margin-top:0.5rem; font-size:0.85rem; color:var(--text-muted); cursor:pointer;" onclick="document.getElementById('reg-pic-input').click()">Add profile photo</div>
                    <input type="file" id="reg-pic-input" accept="image/*" style="display:none;">
                </div>
                
                <div class="form-group">
                    <label for="reg-name">Full Name *</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" placeholder="johndoe" maxlength="30">
                </div>
                
                <div class="form-group">
                    <label for="reg-email">Email Address *</label>
                    <input type="email" id="reg-email" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="+263 77 000 0000">
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Password *</label>
                    <input type="password" id="reg-password" placeholder="At least 6 characters" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-confirm">Confirm Password *</label>
                    <input type="password" id="reg-confirm" placeholder="Re-enter password" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-role">I want to *</label>
                    <select id="reg-role" required>
                        <option value="tenant">Rent a property (Tenant)</option>
                        <option value="landlord">List my property (Landlord)</option>
                    </select>
                </div>
                
                <button type="submit" class="btn btn-success btn-lg" style="width:100%; margin-top:1rem;">Create Account</button>
            </form>

            <div style="margin-top:2rem; text-align:center;">
                <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1rem;">Or sign up with</p>
                <div style="display:grid; gap:0.6rem;">
                    <button class="btn btn-outline" style="width:100%; display:flex; align-items:center; justify-content:center; gap:0.8rem; padding:0.7rem;" onclick="handleGoogleLogin()">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:20px; height:20px;" alt="Google">
                        Continue with Google
                    </button>
                    <button class="btn btn-outline" style="width:100%; display:flex; align-items:center; justify-content:center; gap:0.8rem; padding:0.7rem;" onclick="showError('Phone sign-up coming soon. Please use email registration for now.')">
                        <i class="fas fa-phone" style="width:20px; text-align:center;"></i>
                        Continue with Phone
                    </button>
                </div>
            </div>
            
            <p style="text-align:center; margin-top:1.5rem; color:var(--text-muted); font-size:0.9rem;">
                Already have an account? <a href="login.html" style="color:var(--primary); font-weight:600;">Sign in here</a>
            </p>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/app.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
</body>
</html>
