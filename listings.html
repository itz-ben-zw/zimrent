<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Listings — ZimRent</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">Zim<span>Rent</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html" class="active">Browse</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="add-listing.html" class="nav-cta">+ List Property</a></li>
            <li><a href="login.html" id="nav-login">Sign In</a></li>
            <li><a href="register.html" id="nav-register">Register</a></li>
            <li><a href="#" id="nav-logout" style="display:none;" onclick="logout(); return false;">Logout</a></li>
            <li><span id="nav-user-info" style="display:none; font-weight:600; color:var(--primary);"></span></li>
        </ul>
        <button class="menu-toggle">☰</button>
    </nav>

    <!-- Page Header -->
    <div class="container" style="padding-top:2rem; padding-bottom:0.5rem;">
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
            <div>
                <h1 style="font-size:1.8rem;">Browse Rentals</h1>
                <p style="color:var(--text-muted);"><span id="listings-count">0 listings found</span></p>
            </div>
            <a href="add-listing.html" class="btn btn-success">+ Add Listing</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div style="display:grid; grid-template-columns: 280px 1fr; gap:2rem;">
            <!-- Sidebar Filters -->
            <aside class="sidebar">
                <h3 style="margin-bottom:1rem; font-size:1.1rem;"><i class="fas fa-filter" style="color:var(--primary);"></i> Filters</h3>
                
                <div class="filter-group">
                    <label>City</label>
                    <select id="filter-city" aria-label="Filter by city">
                        <option value="">All Cities</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Suburb</label>
                    <select id="filter-suburb" aria-label="Filter by suburb">
                        <option value="">All Suburbs</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Bedrooms</label>
                    <select id="filter-bedrooms" aria-label="Filter by minimum bedrooms">
                        <option value="">Any</option>
                        <option value="1">1+</option>
                        <option value="2">2+</option>
                        <option value="3">3+</option>
                        <option value="4">4+</option>
                        <option value="5">5+</option>
                        <option value="6">6+</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Property Type</label>
                    <select id="filter-type" aria-label="Filter by property type">
                        <option value="">All Types</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Currency</label>
                    <select id="filter-currency" aria-label="Filter by currency">
                        <option value="">All Currencies</option>
                        <option value="USD">USD</option>
                        <option value="ZAR">ZAR</option>
                        <option value="ZiG">ZiG</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Price Range (per month)</label>
                    <div style="display:flex; gap:0.5rem;">
                        <input type="number" id="filter-min-price" placeholder="Min" min="0" style="width:50%;">
                        <input type="number" id="filter-max-price" placeholder="Max" min="0" style="width:50%;">
                    </div>
                </div>
                
                <div class="filter-group">
                    <label>Amenities</label>
                    <div class="filter-checkbox">
                        <input type="checkbox" id="filter-solar" value="yes">
                        <label for="filter-solar" style="margin:0; font-weight:400;"><i class="fas fa-sun"></i> Solar Power</label>
                    </div>
                    <div class="filter-checkbox">
                        <input type="checkbox" id="filter-borehole" value="yes">
                        <label for="filter-borehole" style="margin:0; font-weight:400;"><i class="fas fa-tint"></i> Borehole</label>
                    </div>
                    <div class="filter-checkbox">
                        <input type="checkbox" id="filter-fenced" value="yes">
                        <label for="filter-fenced" style="margin:0; font-weight:400;"><i class="fas fa-lock"></i> Fenced</label>
                    </div>
                </div>
                
                <button class="filter-reset" onclick="resetFilters()">Reset All Filters</button>
            </aside>

            <!-- Listings Grid -->
            <main>
                <div class="property-grid" id="listings-grid">
                    <!-- Populated by JS -->
                </div>
            </main>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer" style="margin-top:3rem;">
        <p style="font-weight:700; font-size:1.1rem;">Zim<span style="color:var(--secondary);">Rent</span></p>
        <div class="footer-links">
            <a href="index.html">Home</a>
            <a href="listings.html">Browse</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="add-listing.html">List Property</a>
        </div>
        <div style="margin-top:1rem; padding-top:1rem; border-top:1px solid rgba(255,255,255,0.1); color:#ccc; font-size:0.9rem;">
            <div style="margin-bottom:0.4rem;"><i class="fas fa-envelope" style="width:20px;"></i> <a href="mailto:zimrent.online@gmail.com" style="color:#ccc;">zimrent.online@gmail.com</a></div>
            <div style="margin-bottom:0.4rem;"><i class="fas fa-phone" style="width:20px;"></i> +263 71 080 2153</div>
            <div><i class="fas fa-phone" style="width:20px;"></i> +27 61 815 5957</div>
        </div>
        <p style="color:#aaa; font-size:0.85rem; margin-top:1rem;">© 2025 ZimRent. Built for Zimbabwe.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/listings.js"></script>
</body>
</html>
