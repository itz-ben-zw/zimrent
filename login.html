<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — ZimRent</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="nav-brand">Zim<span>Rent</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html">Browse</a></li>
            <li><a href="register.html" id="nav-register">Register</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width:450px; margin-top:3rem;">
        <div class="form-card">
            <h2 style="text-align:center; margin-bottom:0.5rem;">Welcome Back</h2>
            <p style="text-align:center; color:var(--text-muted); margin-bottom:2rem;">Sign in to manage your listings</p>
            
            <div id="auth-error" style="display:none; padding:0.8rem; background:#ffe6e6; color:var(--danger); border-radius:8px; margin-bottom:1rem; font-size:0.9rem;"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email Address *</label>
                    <input type="email" id="login-email" placeholder="your@email.com" required>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password *</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                
                <div style="text-align:right; margin-top:0.3rem;">
                    <a href="forgot-password.html" style="font-size:0.85rem; color:var(--text-muted);">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%; margin-top:1rem;">Sign In</button>
            </form>
            
            <p style="text-align:center; margin-top:1.5rem; color:var(--text-muted); font-size:0.9rem;">
                Don't have an account? <a href="register.html" style="color:var(--primary); font-weight:600;">Register here</a>
            </p>
        </div>
    </div>

    <script src="js/app.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
</body>
</html>
