<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light">
    <title>Reset Password — ZimRent</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-brand">Zim<span>Rent</span></a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="listings.html">Browse</a></li>
            <li><a href="login.html">Sign In</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width:450px; margin-top:3rem;">
        <div class="form-card">
            <h2 style="text-align:center; margin-bottom:0.5rem;">Reset Password</h2>
            <p style="text-align:center; color:var(--text-muted); margin-bottom:2rem;">Enter your email to receive a reset link</p>
            
            <div id="auth-error" style="display:none; padding:0.8rem; background:#ffe6e6; color:var(--danger); border-radius:8px; margin-bottom:1rem; font-size:0.9rem;"></div>
            <div id="auth-success" style="display:none; padding:0.8rem; background:#d4edda; color:#155724; border-radius:8px; margin-bottom:1rem; font-size:0.9rem;"></div>
            
            <form id="forgot-form">
                <div class="form-group">
                    <label for="forgot-email">Email Address *</label>
                    <input type="email" id="forgot-email" placeholder="your@email.com" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%; margin-top:1rem;">Send Reset Link</button>
            </form>
            
            <p style="text-align:center; margin-top:1.5rem; font-size:0.9rem;">
                <a href="login.html" style="color:var(--primary);">Back to Sign In</a>
            </p>
        </div>

        <div class="form-card" id="reset-section" style="margin-top:1.5rem; display:none;">
            <h3 style="text-align:center; margin-bottom:1rem;">Enter New Password</h3>
            <div id="reset-error" style="display:none; padding:0.8rem; background:#ffe6e6; color:var(--danger); border-radius:8px; margin-bottom:1rem; font-size:0.9rem;"></div>
            <form id="reset-form">
                <input type="hidden" id="reset-token">
                <div class="form-group">
                    <label for="reset-password">New Password *</label>
                    <input type="password" id="reset-password" placeholder="At least 6 characters" required>
                </div>
                <button type="submit" class="btn btn-success btn-lg" style="width:100%; margin-top:1rem;">Reset Password</button>
            </form>
        </div>
    </div>

    <script src="js/app.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const forgotForm = document.getElementById('forgot-form');
        const resetForm = document.getElementById('reset-form');

        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value.trim();
            const errorEl = document.getElementById('auth-error');
            const successEl = document.getElementById('auth-success');
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (data.resetToken) {
                    document.getElementById('reset-token').value = data.resetToken;
                    document.getElementById('reset-section').style.display = 'block';
                    successEl.textContent = 'Reset token received. Enter your new password below.';
                    successEl.style.display = 'block';
                } else {
                    successEl.textContent = data.message || 'If the email exists, a reset link has been sent.';
                    successEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.style.display = 'block';
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('reset-token').value;
            const newPassword = document.getElementById('reset-password').value;
            const errorEl = document.getElementById('reset-error');
            errorEl.style.display = 'none';

            if (newPassword.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();
                if (res.ok) {
                    alert('Password reset successfully! Please sign in.');
                    window.location.href = 'login.html';
                } else {
                    errorEl.textContent = data.error || 'Reset failed.';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.style.display = 'block';
            }
        });
    });
    </script>
</body>
</html>
